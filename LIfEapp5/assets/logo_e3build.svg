<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" fill="none">
  <!-- House + bar chart + arrow icon -->
  <g transform="translate(8, 8)">
    <!-- House outline: roof peak + walls -->
    <path d="M20 135 L20 65 L68 18 L116 65 L116 135 Z" stroke="#1c2e3d" stroke-width="6.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Curved arrow swoosh from bottom-left going up around to upper-right -->
    <path d="M2 142 Q2 90, 35 62 Q50 50, 72 38" stroke="#1c2e3d" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polygon points="68,28 82,38 68,46" fill="#1c2e3d"/>

    <!-- Bar chart: 4 ascending bars (green tones, left to right) -->
    <rect x="34" y="105" width="16" height="30" rx="1.5" fill="#5ebd5e"/>
    <rect x="54" y="88" width="16" height="47" rx="1.5" fill="#4aaa4a"/>
    <rect x="74" y="70" width="16" height="65" rx="1.5" fill="#389438"/>
    <rect x="94" y="50" width="16" height="85" rx="1.5" fill="#267d26"/>
  </g>

  <!-- "E" character -->
  <text x="155" y="102" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="88" fill="#1a3a2a" letter-spacing="-3">E</text>
  <!-- Superscript "3" -->
  <text x="216" y="56" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="42" fill="#1a3a2a">3</text>
  <!-- "Build" -->
  <text x="248" y="102" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="88" fill="#1a3a2a" letter-spacing="-3">Build</text>

  <!-- Subtitle -->
  <text x="160" y="136" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="22" fill="#3a6b48" letter-spacing="0.5" font-style="italic">(Energy + Environment + Envelope)</text>
</svg>
